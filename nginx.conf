# Определяем: браузерная навигация (refresh страницы) или API-запрос от axios.
# Браузер отправляет Accept: text/html — нужно отдать index.html.
# Axios отправляет Accept: application/json,... — нужно проксировать на бэкенд.
map $http_accept $is_browser_nav {
    default     0;
    ~*text/html 1;
}

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml text/javascript;
    gzip_min_length 1024;

    # ── /admin ─────────────────────────────────────────────────────────────────
    # Конфликтный путь: и фронт (/admin, /admin/users/:id, /admin/inventory),
    # и бэкенд (/admin/users, /admin/bikes, ...) используют один префикс.
    # Решение: браузерные GET (text/html, без Authorization) → index.html,
    #          API-запросы от axios (Authorization header, application/json) → backend.
    location /admin {
        if ($is_browser_nav) {
            rewrite ^ /index.html last;
        }
        proxy_pass         http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── Остальные API-пути (нет конфликта с фронтом) ──────────────────────────
    location ~ ^/(auth|users|api|health) {
        proxy_pass         http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── Статика и SPA-fallback ────────────────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }
}
